# Cloudflare Pages deploy config.
#
#   Build command:      npm run build
#   Build output dir:   dist
#   Framework preset:   Astro (or "None" — the output is plain static files)
#
# The build produces a self-contained dist/ that works on any static host
# (Cloudflare Pages, Netlify, GitHub Pages, a plain nginx box, an S3 bucket).
# No server, no functions, no runtime.
name = "nuthatch-frontend"
compatibility_date = "2026-07-14"
pages_build_output_dir = "dist"
